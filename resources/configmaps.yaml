---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shlink-mariadb
  namespace: shlink
  labels:
    app: mariadb
    component: "master"
data:
  my.cnf: |-
    [mysqld]
    skip-name-resolve
    explicit_defaults_for_timestamp
    basedir=/opt/mariadb
    plugin_dir=/opt/mariadb/plugin
    port=3306
    socket=/opt/mariadb/tmp/mysql.sock
    tmpdir=/opt/mariadb/tmp
    max_allowed_packet=16M
    bind-address=0.0.0.0
    pid-file=/opt/mariadb/tmp/mysqld.pid
    log-error=/opt/mariadb/logs/mysqld.log
    character-set-server=UTF8
    collation-server=utf8_general_ci
    [client]
    port=3306
    socket=/opt/mariadb/tmp/mysql.sock
    default-character-set=UTF8
    plugin_dir=/opt/mariadb/plugin
    [manager]
    port=3306
    socket=/opt/mariadb/tmp/mysql.sock
    pid-file=/opt/mariadb/tmp/mysqld.pid
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shlink-mariadb-tests
  namespace: shlink
data:
  run.sh: |-
    @test "Testing MariaDB is accessible" {
      mysql -h shlink-mariadb -uroot -p$MARIADB_ROOT_PASSWORD -e 'show databases;'
    }
